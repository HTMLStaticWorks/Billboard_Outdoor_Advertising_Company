<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdVantage OOH | Media Buyer Login Portal</title>
  <meta name="description"
    content="Secure login for agencies, brands, and media buyers. Access regional dashboard analytics and track screen flight schedules.">
  <link class="styling-icons" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="assets/js/theme-toggle.js"></script>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column; position: relative;">
  <!-- Page Loader -->
  <div class="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- Floating Theme and RTL Toggles -->
  <div
    style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 0.5rem; align-items: center;">
    <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
      <i class="bi bi-moon-stars-fill"></i>
    </button>
    <button id="rtl-toggle-btn" class="theme-toggle-btn" aria-label="Toggle RTL Layout">RTL</button>
  </div>

  <!-- Login Main Card Form -->
  <main
    style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 0; background: radial-gradient(circle at 50% 50%, rgba(37,99,235,0.05) 0%, transparent 60%);">
    <div class="container d-flex justify-content-center">
      <div class="card glass-panel p-4" style="max-width: 420px; width: 100%; border: 1px solid var(--border-color);">
        <div class="text-center mb-4">
          <a href="index.html" class="logo-link justify-content-center mb-3">
            <i class="bi bi-broadcast"></i> AD<span>VANTAGE</span>
          </a>
          <h2 style="font-family: var(--font-heading); margin-bottom: 0.5rem;">Access Buyer Portal</h2>
          <p style="font-size: 0.85rem; color: var(--text-secondary);">Manage OOH campaign statistics and reserve
            screens</p>
        </div>

        <form action="index.html#dashboard-preview" method="GET">
          <div class="row g-2 mb-3">
            <div class="col-6">
              <button type="button" class="btn btn-social w-100">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px">
                  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v9.09h12.64c-.54 2.87-2.17 5.31-4.61 6.94l7.17 5.56c4.19-3.86 6.59-9.54 6.59-16.9z"/>
                  <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.17-5.56c-1.99 1.33-4.51 2.12-8.72 2.12-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span>Google</span>
              </button>
            </div>
            <div class="col-6">
              <button type="button" class="btn btn-social w-100">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="16px" height="16px" fill="currentColor">
                  <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-118.5-65.2-31.2-79.6-79.2-79.7-112.6zm-57.3-151.9c33-40 30-74.4 28.5-80.8-28.2 2.1-57.2 19.3-73 37.9-15.6 18.4-27.5 53.2-24.3 81.4 31.8 2.5 57.8-19.1 68.8-38.5z"/>
                </svg>
                <span>Apple</span>
              </button>
            </div>
          </div>

          <div class="d-flex align-items-center mb-3">
            <div style="flex: 1; border-bottom: 1px solid var(--border-color);"></div>
            <span class="px-2" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);">or continue with email</span>
            <div style="flex: 1; border-bottom: 1px solid var(--border-color);"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-email">Work Email</label>
            <input type="email" id="login-email" class="form-control" placeholder="buyer@company.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-pass">Password</label>
            <div class="password-wrapper">
              <input type="password" id="login-pass" class="form-control" placeholder="**********" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4" style="font-size: 0.8rem;">
            <div>
              <input type="checkbox" id="login-rem">
              <label for="login-rem" style="color: var(--text-secondary);">Remember me</label>
            </div>
            <a href="#" style="font-weight: 500;">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 glow-btn mb-3">Sign In to Dashboard</button>

          <div class="text-center" style="font-size: 0.85rem; color: var(--text-secondary);">
            Don't have a buyer account? <a href="signup.html" style="font-weight: 500;">Register Account</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
