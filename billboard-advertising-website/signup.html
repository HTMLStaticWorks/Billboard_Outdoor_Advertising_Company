<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdVantage OOH | Media Buyer Signup Portal</title>
  <meta name="description"
    content="Register as an advertising agency or brand partner. Gain access to premium OOH listings and real-time impression analytics.">
  <link class="styling-icons" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="assets/js/theme-toggle.js"></script>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column; position: relative;">
  <!-- Page Loader -->
  <div class="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- Floating Theme and RTL Toggles -->
  <div
    style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 0.5rem; align-items: center;">
    <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
      <i class="bi bi-moon-stars-fill"></i>
    </button>
    <button id="rtl-toggle-btn" class="theme-toggle-btn" aria-label="Toggle RTL Layout">
      <i class="bi bi-translate"></i>
    </button>
  </div>

  <!-- Signup Form Card -->
  <main
    style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 0; background: radial-gradient(circle at 50% 50%, rgba(37,99,235,0.05) 0%, transparent 60%);">
    <div class="container d-flex justify-content-center">
      <div class="card glass-panel p-4" style="max-width: 450px; width: 100%; border: 1px solid var(--border-color);">
        <div class="text-center mb-4">
          <a href="index.html" class="logo-link justify-content-center mb-3">
            <i class="bi bi-broadcast"></i> AD<span>VANTAGE</span>
          </a>
          <h2 style="font-family: var(--font-heading); margin-bottom: 0.5rem;">Register Buyer Account</h2>
          <p style="font-size: 0.85rem; color: var(--text-secondary);">Gain access to demographic ratings & book ad
            flights</p>
        </div>

        <form action="index.html#dashboard-preview" method="GET">
          <div class="form-group">
            <label class="form-label" for="signup-name">Contact Person Name</label>
            <input type="text" id="signup-name" class="form-control" placeholder="Jane Doe" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-company">Brand / Agency name</label>
            <input type="text" id="signup-company" class="form-control" placeholder="Vanguard Ads LLC" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-email">Work Email Address</label>
            <input type="email" id="signup-email" class="form-control" placeholder="jane@vanguard.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-pass">Create Password</label>
            <input type="password" id="signup-pass" class="form-control" placeholder="**********" required>
          </div>

          <div class="mb-4" style="font-size: 0.8rem; color: var(--text-secondary);">
            <input type="checkbox" id="signup-terms" required>
            <label for="signup-terms">I agree to OOH media <a href="#" style="font-weight: 600;">terms of carriage</a>
              and network privacy conditions.</label>
          </div>

          <button type="submit" class="btn btn-primary w-100 glow-btn mb-3">Create Account & Enter Dashboard</button>

          <div class="text-center" style="font-size: 0.85rem; color: var(--text-secondary);">
            Already registered? <a href="login.html" style="font-weight: 600;">Log In Portal</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
